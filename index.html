<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color"
  content="#090014">

  <title>Daiana</title>

  <link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
  rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      min-height:100svh;
      width:100%;

      overflow-x:hidden;
      overflow-y:auto;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px 16px 120px;

      background:black;
      color:white;

      position:relative;
    }

    /* Fondo */

    .background{

      position:fixed;
      inset:0;

      background:
      linear-gradient(
      rgba(0,0,0,0.18),
      rgba(0,0,0,0.38)),
      url('sasuke.png') center center/cover no-repeat;

      filter:brightness(0.9);

      transform:scale(1.02);

      z-index:-2;

      animation:zoom 18s ease-in-out infinite alternate;
    }

    /* Glow morado */

    .purple-glow{

      position:fixed;

      width:700px;
      height:700px;

      background:
      radial-gradient(circle,
      rgba(119,0,255,0.18),
      transparent 70%);

      border-radius:50%;

      filter:blur(60px);

      top:-180px;
      left:-180px;

      animation:pulse 9s ease-in-out infinite;

      z-index:-1;
    }

    .purple-glow.two{

      top:auto;
      left:auto;

      bottom:-220px;
      right:-220px;

      animation-delay:4s;
    }

    /* CARD CRISTAL */

    .card{

      position:relative;
      z-index:5;

      width:min(100%,700px);

      padding:65px 45px;

      border-radius:34px;

      /* cristal limpio */
      background:rgba(255,255,255,0.07);

      /* blur suave */
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);

      /* borde elegante */
      border:1px solid rgba(255,255,255,0.14);

      /* profundidad */
      box-shadow:
      0 10px 35px rgba(0,0,0,0.28),
      0 0 25px rgba(162,82,255,0.10),
      inset 0 1px 0 rgba(255,255,255,0.10);

      text-align:center;

      animation:fadeUp 2s ease;

      overflow:hidden;
    }

    /* reflejo cristal */

    .card::before{

      content:'';

      position:absolute;

      inset:0;

      border-radius:inherit;

      background:
      linear-gradient(
      135deg,
      rgba(255,255,255,0.10),
      rgba(255,255,255,0.02),
      transparent 60%);

      pointer-events:none;
    }

    h1{

      position:relative;
      z-index:2;

      font-size:clamp(3rem,8vw,5.8rem);

      letter-spacing:14px;

      font-weight:600;

      margin-bottom:10px;

      color:#eccfff;

      text-shadow:
      0 0 12px rgba(167,91,255,0.65),
      0 0 40px rgba(111,0,255,0.28);
    }

    .subtitle{

      position:relative;
      z-index:2;

      color:#f5e8ff;

      opacity:0.95;

      letter-spacing:7px;

      font-size:0.9rem;

      margin-bottom:26px;
    }

    .divider{

      position:relative;
      z-index:2;

      display:flex;
      align-items:center;
      justify-content:center;

      gap:18px;

      margin-bottom:10px;
    }

    .line{

      width:110px;
      height:1px;

      background:
      linear-gradient(
      to right,
      transparent,
      rgba(210,160,255,0.8),
      transparent);
    }

    .symbol{

      color:#d89fff;

      font-size:1.4rem;

      text-shadow:
      0 0 12px rgba(162,82,255,0.9);
    }

    .message{

      position:relative;
      z-index:2;

      max-width:560px;

      margin:auto;

      font-size:1.08rem;

      line-height:2.1;

      color:rgba(255,255,255,0.96);

      font-weight:300;

      margin-top:45px;
    }

    .quote{

      position:relative;
      z-index:2;

      margin-top:65px;

      font-size:1rem;

      opacity:0.88;

      font-style:italic;
    }

    .quote-author{

      position:relative;
      z-index:2;

      margin-top:14px;

      font-size:0.8rem;

      letter-spacing:4px;

      opacity:0.62;
    }

    /* Música */

    .music-wrapper{

      position:absolute;

      left:50%;
      bottom:45px;

      transform:translateX(-50%);

      z-index:10;

      display:flex;
      flex-direction:column;
      align-items:center;

      gap:16px;
    }

    .music-text{

      opacity:0.74;

      font-size:0.75rem;

      letter-spacing:4px;
    }

    #musicBtn{

      border:none;

      padding:14px 34px;

      border-radius:999px;

      background:rgba(255,255,255,0.06);

      color:#f0dcff;

      font-size:0.82rem;

      letter-spacing:4px;

      cursor:pointer;

      transition:0.35s ease;

      border:1px solid rgba(255,255,255,0.10);

      backdrop-filter:blur(8px);

      box-shadow:
      0 0 20px rgba(111,0,255,0.10);
    }

    #musicBtn:hover{

      transform:scale(1.06);

      background:rgba(255,255,255,0.10);

      box-shadow:
      0 0 35px rgba(119,0,255,0.30);
    }

    /* :V */

    #face{

      position:absolute;

      z-index:20;

      font-size:1.8rem;

      opacity:0;

      color:white;

      text-shadow:
      0 0 15px rgba(119,0,255,0.6);

      pointer-events:none;
    }

    /* Animaciones */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes zoom{

      from{
        transform:scale(1.02);
      }

      to{
        transform:scale(1.07);
      }
    }

    @keyframes pulse{

      0%,100%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.15);
      }
    }

    /* Responsive */

    @media(max-width:700px){

      body{

        padding:20px 14px 140px;

        align-items:flex-start;
      }

      .card{

        width:100%;

        padding:
        45px
        22px;

        border-radius:28px;
      }

      h1{

        font-size:3.1rem;

        letter-spacing:8px;
      }

      .subtitle{

        font-size:0.82rem;

        letter-spacing:5px;
      }

      .message{

        font-size:1rem;

        line-height:1.8;
      }

      .line{
        width:70px;
      }

      .quote{

        font-size:1rem;

        margin-top:50px;
      }

      .music-wrapper{

        position:relative;

        margin-top:25px;

        bottom:auto;
        left:auto;

        transform:none;
      }

      #musicBtn{

        width:100%;

        max-width:260px;
      }

    }

  </style>

</head>

<body>

  <div class="background"></div>

  <div class="purple-glow"></div>
  <div class="purple-glow two"></div>

  <div class="card">

    <h1>DAIANA</h1>

    <div class="subtitle">
      happy birthday.
    </div>

    <div class="divider">

      <div class="line"></div>

      <div class="symbol">✦</div>

      <div class="line"></div>

    </div>

    <div class="message">
      algún día este momento también será un recuerdo.
    </div>

    <div class="quote">
      “Another year survived.”
    </div>

    <div class="quote-author">
      — Uchiha certified 🗿
    </div>

  </div>

  <div id="face">:V</div>

  <div class="music-wrapper">

    <div class="music-text">
      just listen for a while.
    </div>

    <button id="musicBtn">
      ♬ play music
    </button>

  </div>

  <audio id="bgMusic" loop>

    <source
    src="music.mp3"
    type="audio/mpeg">

  </audio>

  <script>

    const music =
    document.getElementById('bgMusic');

    const btn =
    document.getElementById('musicBtn');

    let playing = false;

    btn.addEventListener('click',()=>{

      if(!playing){

        music.volume = 0;

        music.play();

        let volume = 0;

        const fade = setInterval(()=>{

          if(volume < 0.22){

            volume += 0.01;

            music.volume = volume;

          }else{

            clearInterval(fade);
          }

        },200);

        btn.innerText = 'pause music';

        playing = true;

      }else{

        music.pause();

        btn.innerText = '♬ play music';

        playing = false;
      }

    });

    /* :V random */

    const face =
    document.getElementById('face');

    function showFace(){

      face.style.transition =
      '0.3s ease';

      const topPos =
      Math.random() * 75 + 5;

      const leftPos =
      Math.random() * 75 + 5;

      face.style.top =
      topPos + '%';

      face.style.left =
      leftPos + '%';

      face.style.opacity =
      '0.85';

      setTimeout(()=>{

        face.style.opacity = '0';

      },900);
    }

    setInterval(()=>{

      const randomChance =
      Math.random();

      if(randomChance > 0.55){

        showFace();
      }

    },5000);

  </script>

</body>
</html>
