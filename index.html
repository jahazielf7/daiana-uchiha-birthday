<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daiana</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
overflow:hidden;
background:black;
color:white;
position:relative;
}

/* FONDO */

.background{
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.42)),
url('sasuke.png');
background-size:cover;
background-position:-340% center;
animation:bgMove 14s ease-in-out infinite alternate;
z-index:-5;
}

@keyframes bgMove{
0%{transform:scale(1);}
100%{transform:scale(1.04);}
}

/* GLOW */

.overlay{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(119,0,255,.16), transparent 40%),
radial-gradient(circle at bottom right, rgba(140,0,255,.10), transparent 35%);
z-index:-4;
}

/* CUERVOS */

.crow{
position:fixed;
width:90px;
height:90px;
background:url('crow.png') center/contain no-repeat;
opacity:.62;
z-index:8;
pointer-events:none;
filter:
drop-shadow(0 0 10px rgba(0,0,0,.65))
drop-shadow(0 0 18px rgba(0,0,0,.35));
animation:fly linear infinite;
}

.crow1{
top:10%;
left:-120px;
animation-duration:16s;
animation-delay:0s;
}

.crow2{
top:38%;
left:-140px;
animation-duration:21s;
animation-delay:4s;
transform:scale(.85);
}

.crow3{
top:66%;
left:-130px;
animation-duration:18s;
animation-delay:8s;
transform:scale(1.1);
}

@keyframes fly{
0%{
transform:translateX(0) translateY(0);
opacity:0;
}
8%{
opacity:.62;
}
50%{
transform:translateX(60vw) translateY(-18px);
}
100%{
transform:translateX(130vw) translateY(12px);
opacity:0;
}
}

/* LAYOUT */

.wrapper{
width:100%;
height:100vh;
display:flex;
align-items:center;
padding-left:5vw;
}

.left-side{
width:520px;
display:flex;
flex-direction:column;
gap:28px;
}

/* INTRO */

.gaara-intro{
position:absolute;
left:5vw;
top:50%;
transform:translateY(-50%);
width:520px;
padding:18px;
border-radius:30px;
background:rgba(20,20,20,.58);
border:1px solid rgba(255,255,255,.10);
backdrop-filter:blur(12px);
z-index:50;
display:flex;
flex-direction:column;
gap:18px;
align-items:center;
transition:1s ease;
}

.gaara-intro.hide{
opacity:0;
transform:translateY(-50%) scale(.92);
pointer-events:none;
}

.gaara-intro img{
width:100%;
border-radius:22px;
display:block;
}

.gaara-text{
font-size:.74rem;
letter-spacing:4px;
opacity:.75;
}

/* BOTONES */

.startBtn,
#musicBtn{
border:none;
padding:15px 34px;
border-radius:999px;
background:rgba(255,255,255,.08);
color:#f0dcff;
font-size:.82rem;
letter-spacing:4px;
cursor:pointer;
border:1px solid rgba(255,255,255,.14);
backdrop-filter:blur(8px);
transition:.35s ease;
}

.startBtn:hover,
#musicBtn:hover{
transform:scale(1.05);
background:rgba(255,255,255,.13);
}

/* CARD */

.card{
width:100%;
padding:58px 42px;
border-radius:32px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(4px);
border:1px solid rgba(255,255,255,.10);
box-shadow:
0 10px 40px rgba(0,0,0,.35),
0 0 20px rgba(132,0,255,.08);
text-align:center;
opacity:0;
transform:translateY(20px);
transition:1s ease;
animation:floatCard 5s ease-in-out infinite;
}

.card.show{
opacity:1;
}

@keyframes floatCard{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

h1{
font-size:5rem;
letter-spacing:12px;
color:#e8c5ff;
margin-bottom:12px;
text-shadow:0 0 16px rgba(170,90,255,.55);
}

.subtitle{
letter-spacing:7px;
font-size:.9rem;
opacity:.88;
margin-bottom:30px;
}

.divider{
display:flex;
align-items:center;
justify-content:center;
gap:18px;
margin-bottom:18px;
}

.line{
width:90px;
height:1px;
background:linear-gradient(to right,transparent,rgba(220,180,255,.8),transparent);
}

.symbol{
color:#d78dff;
font-size:1.4rem;
}

.message{
font-size:1.08rem;
line-height:2;
margin-top:35px;
}

.quote{
margin-top:60px;
font-size:1rem;
font-style:italic;
opacity:.88;
}

.quote-author{
margin-top:16px;
letter-spacing:4px;
font-size:.8rem;
opacity:.55;
}

/* MUSIC */

.music-wrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
opacity:0;
transform:translateY(20px);
transition:1s ease;
}

.music-wrapper.show{
opacity:1;
transform:translateY(0);
}

.music-text{
font-size:.74rem;
letter-spacing:4px;
opacity:.7;
}

/* RESPONSIVE */

@media(max-width:900px){

.wrapper{
padding:24px 14px;
align-items:center;
}

.left-side{
width:58%;
min-width:260px;
}

.background{
background-position:-460% center;
background-size:145%;
}

.card{
padding:42px 18px;
border-radius:26px;
}

h1{
font-size:3.2rem;
letter-spacing:7px;
}

.subtitle{
font-size:.76rem;
letter-spacing:4px;
}

.message{
font-size:.95rem;
line-height:1.8;
}

.line{
width:45px;
}

.quote{
font-size:.95rem;
margin-top:45px;
}

.quote-author{
font-size:.7rem;
letter-spacing:2px;
}

#musicBtn,
.startBtn{
width:100%;
font-size:.72rem;
padding:13px 18px;
}

.music-text,
.gaara-text{
font-size:.64rem;
letter-spacing:2px;
}

.gaara-intro{
left:14px;
width:58%;
min-width:260px;
padding:12px;
border-radius:24px;
}

.gaara-intro img{
border-radius:18px;
}

.crow{
width:58px;
height:58px;
opacity:.50;
}

}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="crow crow1"></div>
<div class="crow crow2"></div>
<div class="crow crow3"></div>

<div class="gaara-intro" id="gaaraIntro">

<img src="gaara.png">

<div class="gaara-text">
just listen for a while.
</div>

<button class="startBtn" id="startBtn">
♬ play music
</button>

</div>

<div class="wrapper">

<div class="left-side">

<div class="card" id="mainCard">

<h1>DAIANA</h1>

<div class="subtitle">
happy birthday.
</div>

<div class="divider">
<div class="line"></div>
<div class="symbol">✦</div>
<div class="line"></div>
</div>

<div class="message">
El tiempo avanza, los recuerdos quedan... y tus sueños esperan ser conquistados...
</div>

<div class="quote">
“Another year survived.”
</div>

<div class="quote-author">
— Uchiha certified 🗿
</div>

</div>

<div class="music-wrapper" id="musicWrap">

<div class="music-text">
just listen for a while.
</div>

<button id="musicBtn">
pause music
</button>

</div>

</div>
</div>

<audio id="gaaraVoice">
<source src="isai.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const intro = document.getElementById('gaaraIntro');
const startBtn = document.getElementById('startBtn');

const voice = document.getElementById('gaaraVoice');
const music = document.getElementById('bgMusic');

const card = document.getElementById('mainCard');
const wrap = document.getElementById('musicWrap');
const musicBtn = document.getElementById('musicBtn');

let playing = false;

startBtn.addEventListener('click', async ()=>{

try{
voice.volume = 1;
voice.currentTime = 0;
await voice.play();
}catch(e){}

music.volume = 0;
music.play();

let volume = 0;

const fade = setInterval(()=>{

if(volume < .22){
volume += .01;
music.volume = volume;
}else{
clearInterval(fade);
}

},200);

playing = true;

setTimeout(()=>{
intro.classList.add('hide');
},4200);

setTimeout(()=>{
card.classList.add('show');
wrap.classList.add('show');
},5000);

});

musicBtn.addEventListener('click',()=>{

if(playing){

music.pause();
musicBtn.innerText='♬ play music';
playing=false;

}else{

music.play();
musicBtn.innerText='pause music';
playing=true;

}

});

</script>

</body>
</html>
