<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daiana</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      min-height:100svh;
      width:100%;

      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;

      background:black;
      color:white;

      position:relative;
    }

    /* Fondo */

    .background{

      position:absolute;
      inset:0;

      background:
      linear-gradient(
      rgba(0,0,0,0.28),
      rgba(0,0,0,0.45)),
      url('sasuke.png') center center/cover no-repeat;

      transform:scale(1.03);

      filter:blur(0px) brightness(0.82);

      animation:zoom 18s ease-in-out infinite alternate;
    }

    /* Glow morado */

    .purple-glow{

      position:absolute;

      width:700px;
      height:700px;

      background:radial-gradient(circle,
      rgba(119,0,255,0.22),
      transparent 70%);

      border-radius:50%;

      filter:blur(60px);

      top:-180px;
      left:-180px;

      animation:pulse 9s ease-in-out infinite;
    }

    .purple-glow.two{
      top:auto;
      left:auto;
      bottom:-220px;
      right:-220px;
      animation-delay:4s;
    }

    /* Card */

    .card{

      position:relative;
      z-index:5;

      width:min(92%,760px);

      padding:70px 55px;

      border-radius:30px;

      /* SUPER TRANSPARENTE */
      background:rgba(10, 5, 20, 0.06);

      /* vidrio suave */
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);

      border:1.5px solid rgba(180,120,255,0.22);

      box-shadow:
      0 0 25px rgba(140,60,255,0.10),
      0 0 60px rgba(111,0,255,0.05),
      inset 0 0 12px rgba(255,255,255,0.02);

      text-align:center;

      animation:fadeUp 2s ease;
    }

    h1{

      font-size:clamp(3rem,8vw,5.8rem);

      letter-spacing:14px;

      font-weight:600;

      margin-bottom:10px;

      color:#e0b7ff;

      text-shadow:
      0 0 12px rgba(167,91,255,0.65),
      0 0 40px rgba(111,0,255,0.25);
    }

    .subtitle{

      color:#f0ddff;

      opacity:0.9;

      letter-spacing:7px;

      font-size:0.9rem;

      margin-bottom:26px;
    }

    .message{

      max-width:560px;

      margin:auto;

      font-size:1.08rem;

      line-height:2.1;

      color:rgba(255,255,255,0.96);

      font-weight:300;

      margin-top:45px;
    }

    .divider{

      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;

      margin-bottom:10px;
    }

    .line{

      width:110px;
      height:1px;

      background:linear-gradient(to right,
      transparent,
      rgba(210,160,255,0.8),
      transparent);
    }

    .symbol{

      color:#d79cff;

      font-size:1.4rem;

      text-shadow:0 0 12px rgba(162,82,255,0.9);
    }

    .quote{

      margin-top:65px;

      font-size:1rem;

      opacity:0.82;

      font-style:italic;
    }

    .quote-author{

      margin-top:14px;

      font-size:0.8rem;

      letter-spacing:4px;

      opacity:0.58;
    }

    /* musica */

    .music-wrapper{

      position:absolute;

      left:50%;
      bottom:45px;

      transform:translateX(-50%);

      z-index:10;

      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }

    .music-text{

      opacity:0.72;

      font-size:0.75rem;

      letter-spacing:4px;
    }

    #musicBtn{

      border:none;

      padding:14px 34px;

      border-radius:999px;

      background:rgba(0,0,0,0.12);

      color:#efd8ff;

      font-size:0.82rem;

      letter-spacing:4px;

      cursor:pointer;

      transition:0.35s ease;

      border:1.3px solid rgba(200,140,255,0.30);

      backdrop-filter:blur(8px);

      box-shadow:
      0 0 20px rgba(111,0,255,0.10);
    }

    #musicBtn:hover{

      transform:scale(1.06);

      background:rgba(255,255,255,0.10);

      box-shadow:
      0 0 35px rgba(119,0,255,0.30);
    }

    /* :V */

    #face{

      position:absolute;

      z-index:20;

      font-size:1.8rem;

      opacity:0;

      color:white;

      text-shadow:0 0 15px rgba(119,0,255,0.6);

      pointer-events:none;
    }

    /* Animaciones */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes zoom{

      from{
        transform:scale(1.03);
      }

      to{
        transform:scale(1.08);
      }
    }

    @keyframes pulse{

      0%,100%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.15);
      }
    }

    /* responsive */

    @media(max-width:700px){

      .card{
        padding:50px 28px;
        width:90%;
      }

      .subtitle{
        margin-bottom:50px;
      }

      .message{
        font-size:0.96rem;
        line-height:1.9;
      }

      .quote{
        margin-top:50px;
      }

      .music-wrapper{
        bottom:28px;
      }

      #musicBtn{
        padding:12px 26px;
        font-size:0.72rem;
      }
    }

  </style>
</head>
<body>

  <div class="background"></div>

  <div class="purple-glow"></div>
  <div class="purple-glow two"></div>

  <div class="card">

    <h1>DAIANA</h1>

    <div class="subtitle">
      happy birthday.
    </div>

    <div class="divider">
      <div class="line"></div>
      <div class="symbol">✦</div>
      <div class="line"></div>
    </div>

    <div class="message">
      algún día este momento también será un recuerdo.
    </div>

    <div class="quote">
      “Another year survived.”
    </div>

    <div class="quote-author">
      — Uchiha certified 🗿
    </div>

  </div>

  <div id="face">:V</div>

  <div class="music-wrapper">

    <div class="music-text">
      just listen for a while.
    </div>

    <button id="musicBtn">
      ♬ play music
    </button>

  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>

    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');

    let playing = false;

    btn.addEventListener('click',()=>{

      if(!playing){

        music.volume = 0;

        music.play();

        let volume = 0;

        const fade = setInterval(()=>{

          if(volume < 0.22){

            volume += 0.01;
            music.volume = volume;

          }else{

            clearInterval(fade);
          }

        },200);

        btn.innerText = 'pause music';

        playing = true;

      }else{

        music.pause();

        btn.innerText = '♬ play music';

        playing = false;
      }

    });

    /* :V random */

    const face = document.getElementById('face');

    function showFace(){

      face.style.transition = '0.3s ease';

      const topPos = Math.random() * 75 + 5;
      const leftPos = Math.random() * 75 + 5;

      face.style.top = topPos + '%';
      face.style.left = leftPos + '%';

      face.style.opacity = '0.85';

      setTimeout(()=>{

        face.style.opacity = '0';

      },900);
    }

    setInterval(()=>{

      const randomChance = Math.random();

      if(randomChance > 0.55){

        showFace();
      }

    },5000);

  </script>

</body>
</html>
